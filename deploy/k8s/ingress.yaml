apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f5-ingress
spec:
  rules:
  - host: f5.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: f5-frontend-service
            port:
              number: 80
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: f5-backend-service
            port:
              number: 8000