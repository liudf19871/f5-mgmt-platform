version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - f5-network

  backend:
    build:
      context: ../backend
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:root@mysql:3306/f5_platform}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=f5_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-production-secret-key-change-this}
    depends_on:
      - mysql
      - clickhouse
      - redis
    networks:
      - f5-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=f5_platform
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - f5-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - f5-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - f5-network

volumes:
  mysql-data:
  clickhouse-data:
  redis-data:

networks:
  f5-network:
    driver: bridge